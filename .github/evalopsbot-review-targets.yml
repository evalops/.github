version: 1
org: evalops
reviewer: EvalOpsBot
central_repo: evalops/.github
dispatch_secret: EVALOPS_PR_LENS_TOKEN
app_secrets:
  - EVALOPS_PR_LENS_APP_ID
  - EVALOPS_PR_LENS_APP_PRIVATE_KEY
  - EVALOPS_PR_LENS_APP_INSTALLATION_ID
central_workflows:
  - .github/workflows/evalops-pr-lens-review.yml
  - .github/workflows/evalopsbot-review-request-dispatch.yml
  - .github/workflows/evalopsbot-review-canary.yml
target_repositories:
  - repo: evalops/cerebro
    fallback_workflow: .github/workflows/evalopsbot-review-request.yml
  - repo: evalops/chat
    fallback_workflow: .github/workflows/evalopsbot-review-request.yml
  - repo: evalops/deploy
    fallback_workflow: .github/workflows/evalopsbot-review-request.yml
  - repo: evalops/diffscope
    fallback_workflow: .github/workflows/evalopsbot-review-request.yml
  - repo: evalops/ensemble
    fallback_workflow: .github/workflows/evalopsbot-review-request.yml
  - repo: evalops/maestro
    fallback_workflow: .github/workflows/evalopsbot-review-request.yml
  - repo: evalops/maestro-internal
    fallback_workflow: .github/workflows/evalopsbot-review-request.yml
  - repo: evalops/platform
    fallback_workflow: .github/workflows/evalopsbot-review-request.yml
exemptions: []
