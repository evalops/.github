name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: input
    id: service
    attributes:
      label: Service / Repo
      description: Which service does this relate to?
      placeholder: e.g. identity, governance, console
    validations:
      required: false
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work?
    validations:
      required: false
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: What must be true for this to be done?
      placeholder: |
        - [ ] User-visible or operator-visible behavior is implemented
        - [ ] Tests or validation cover the new path
        - [ ] Docs/runbook/flags are updated where needed
    validations:
      required: false
  - type: textarea
    id: cross_repo
    attributes:
      label: Cross-Repo Impact
      description: List dependent repos, contracts, deploy flags, generated artifacts, or rollout gates.
      placeholder: evalops/platform, evalops/deploy, evalops/proto, evalops/maestro-internal
    validations:
      required: false
