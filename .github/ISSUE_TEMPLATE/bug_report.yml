name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug", "triage"]
body:
  - type: input
    id: service
    attributes:
      label: Service / Repo
      description: Which service is affected?
      placeholder: e.g. identity, governance, console
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
    validations:
      required: false
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Staging, production, local?
      placeholder: e.g. production, staging
    validations:
      required: false
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Link logs, GitHub Actions runs, Argo apps, screenshots, traces, or reproduction artifacts.
      placeholder: |
        - GH run:
        - PR:
        - Argo app:
        - Logs/traces:
    validations:
      required: false
  - type: textarea
    id: impact
    attributes:
      label: Impact / Blast Radius
      description: Which users, services, repos, contracts, or releases are affected?
    validations:
      required: false
