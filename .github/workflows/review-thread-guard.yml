name: review-thread-guard

on:
  workflow_call:
    inputs:
      pr_number:
        description: "Pull request number to inspect"
        required: true
        type: string
      min_severity:
        description: "Minimum severity to block on"
        required: false
        default: "high"
        type: string
      runner_label:
        description: "Runner label used for the validation job"
        required: false
        type: string
        default: ubuntu-latest
      guard_ref:
        description: "evalops/.github ref to checkout for guard scripts"
        required: false
        type: string
        default: 1a8d8e42854b0d13818d7c46fc689613aa5bb271
      settle_seconds:
        description: "Seconds to wait before checking review feedback so bot reviews can finish before auto-merge"
        required: false
        type: string
        default: "90"
  workflow_dispatch:
    inputs:
      repo:
        description: "Repository to inspect, as owner/name"
        required: false
        type: string
      pr_number:
        description: "Pull request number to inspect"
        required: true
        type: string
      min_severity:
        description: "Minimum severity to block on"
        required: false
        default: "high"
        type: choice
        options:
          - high
          - p1
          - p0
      guard_ref:
        description: "evalops/.github ref to checkout for guard scripts"
        required: false
        type: string
        default: 1a8d8e42854b0d13818d7c46fc689613aa5bb271
      settle_seconds:
        description: "Seconds to wait before checking review feedback so bot reviews can finish before auto-merge"
        required: false
        type: string
        default: "90"

permissions:
  contents: read
  pull-requests: read

jobs:
  unresolved-review-threads:
    runs-on: ${{ inputs.runner_label || 'ubuntu-latest' }}
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
        with:
          repository: evalops/.github
          ref: ${{ inputs.guard_ref || '1a8d8e42854b0d13818d7c46fc689613aa5bb271' }}
          path: evalops-github

      - name: Let asynchronous review bots settle
        env:
          SETTLE_SECONDS: ${{ inputs.settle_seconds || '90' }}
        run: |
          set -euo pipefail
          case "${SETTLE_SECONDS}" in
            ''|*[!0-9]*)
              echo "::error::settle_seconds must be a non-negative integer"
              exit 2
              ;;
          esac
          if [ "${SETTLE_SECONDS}" -gt 0 ]; then
            echo "Waiting ${SETTLE_SECONDS}s before checking review feedback."
            sleep "${SETTLE_SECONDS}"
          fi

      - name: Fail on unresolved high-priority review threads
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_REPO: ${{ inputs.repo || github.repository }}
          PR_NUMBER: ${{ inputs.pr_number }}
          MIN_SEVERITY: ${{ inputs.min_severity || 'high' }}
        run: |
          ruby evalops-github/.github/scripts/check-pr-review-threads.rb \
            --repo "${TARGET_REPO}" \
            --pr "${PR_NUMBER}" \
            --min-severity "${MIN_SEVERITY}"
