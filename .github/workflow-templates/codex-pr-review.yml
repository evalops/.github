name: Codex pull request review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number to review"
        required: false
        type: string

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  codex-review:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      final_message: ${{ steps.run-codex.outputs.final-message }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'pull_request' && format('refs/pull/{0}/merge', github.event.pull_request.number) || github.ref }}
          fetch-depth: 0

      - name: Pre-fetch pull request refs
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          git fetch --no-tags origin \
            "${{ github.event.pull_request.base.ref }}" \
            "+refs/pull/${{ github.event.pull_request.number }}/head"

      - name: Run Codex review
        id: run-codex
        uses: openai/codex-action@5c3f4ccdb2b8790f73d6b21751ac00e602aa0c02
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            Review this EvalOps pull request. Read applicable AGENTS.md files,
            inspect the diff and live GitHub context, and focus on actionable
            defects, missing tests, generated drift, CI risk, workflow label
            churn, and distributed tracing regressions. Include file/line
            references when possible.
          output-file: codex-review.md
          safety-strategy: drop-sudo
          sandbox: read-only

      - name: Post Codex feedback
        if: ${{ steps.run-codex.outputs.final-message != '' && github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ steps.run-codex.outputs.final-message }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: process.env.CODEX_FINAL_MESSAGE,
            });
