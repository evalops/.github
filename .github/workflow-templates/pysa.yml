name: Pysa static analysis

on:
  pull_request:
    paths:
      - "**/*.py"
      - "pyproject.toml"
      - "requirements*.txt"
      - ".pyre_configuration*"
      - ".pysa/**"
      - ".github/workflows/pysa.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pysa:
    uses: evalops/.github/.github/workflows/pysa.yml@main
