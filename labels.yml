schema_version: evalops.labels.v1
source_repo: evalops/platform
sync:
  additive: true
  opt_out_file: .github/labels-sync.disabled
labels:
  - name: bug
    description: Something is not working
    color: d73a4a
  - name: documentation
    description: Improvements or additions to documentation
    color: "0075ca"
  - name: duplicate
    description: This issue or pull request already exists
    color: cfd3d7
  - name: enhancement
    description: New feature or request
    color: a2eeef
  - name: good first issue
    description: Good for newcomers
    color: "7057ff"
  - name: help wanted
    description: Extra attention is needed
    color: "008672"
  - name: invalid
    description: This does not seem right
    color: e4e669
  - name: question
    description: Further information is requested
    color: d876e3
  - name: wontfix
    description: This will not be worked on
    color: ffffff
  - name: dependencies
    description: Pull requests that update a dependency file
    color: "0366d6"
  - name: go
    description: Pull requests that update Go code
    color: 16e2e2
  - name: javascript
    description: Pull requests that update JavaScript code
    color: "168700"
  - name: sync
    description: Crossover sync between standalone repos and _import/ mirrors
    color: 1d76db
  - name: operational
    description: Operational practices, runbooks, and reliability
    color: 0e8a16
  - name: architecture-review
    description: Cross-service architecture review requested
    color: "5319e7"
  - name: security
    description: Security vulnerabilities and hardening
    color: d73a4a
  - name: upstream-absorbed
    description: Issue absorbed from an archived upstream service repository
    color: 6f42c1
  - name: foundation
    description: Unblocks multiple downstream issues; start here
    color: "0052cc"
  - name: agent-authored
    description: All PR commits carry explicit EvalOps agent authorship trailers
    color: 6f42c1
  - name: human-authored
    description: No PR commits carry EvalOps agent authorship trailers
    color: 0e8a16
  - name: mixed-authorship
    description: Some PR commits carry explicit EvalOps agent trailers and some are untrailered
    color: fbca04
  - name: agent-assisted
    description: PR commits are assumed LLM-assisted but do not carry explicit EvalOps agent trailers
    color: 1d76db
  - name: "autorelease: pending"
    description: Release automation has a pending release PR or tag action
    color: ededed
  - name: "autorelease: tagged"
    description: Release automation has tagged the pending release
    color: ededed
